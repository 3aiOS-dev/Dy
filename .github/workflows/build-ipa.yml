name: 21s Login Only (SwiftUI)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  NEW_BUNDLE_ID: "com.vip21.store.pro"
  NEW_APP_NAME:  "21s"

jobs:
  build:
    runs-on: macos-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode_26.5.app/Contents/Developer
          xcode-select -p
          swift --version

      - name: Install required tools
        run: |
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew install ldid zip 2>/dev/null || true
          command -v ldid || { echo "❌ ldid not installed"; exit 1; }
          command -v zip || { echo "❌ zip not installed"; exit 1; }

      # =========================================================
      # RESOURCES & ASSETS (actual project images, embedded here
      # as base64 so the workflow is fully self-contained, then
      # decoded to real files and bundled into the app)
      # =========================================================
      - name: Restore project images
        run: |
          mkdir -p Resources

          # Illustration image shown on the login screen — decoded from base64 embedded below
          echo '' | base64 -d > Resources/login_logo.png

          # Illustration image shown on the register screen — decoded from base64 embedded below
          echo '' | base64 -d > Resources/register_logo.png
          # Onboarding screen 1 — Research illustration (collaboration/teamwork)          echo '' | base64 -d > Resources/onboarding_research.png          # Onboarding screen 2 — Security illustration (shield/protection)          echo '' | base64 -d > Resources/onboarding_security.png          # Onboarding screen 3 — Access illustration (mobile login/entry)          echo '' | base64 -d > Resources/onboarding_access.png
          file Resources/login_logo.png Resources/register_logo.png Resources/onboarding_research.png Resources/onboarding_security.png Resources/onboarding_access.png
          ls -lh Resources

      - name: Generate app icons from the logo image
        run: |
          python3 -m pip install --quiet --break-system-packages Pillow
          python3 << 'PYEOF'
          from PIL import Image

          src = Image.open("Resources/login_logo.png").convert("RGBA")

          def make_icon(size, path):
              bg = Image.new("RGBA", (size, size), (10, 12, 18, 255))
              logo = src.resize((size, size))
              bg.alpha_composite(logo)
              bg.convert("RGB").save(path, "PNG")

          make_icon(120,  "Resources/AppIcon60x60@2x.png")
          make_icon(180,  "Resources/AppIcon60x60@3x.png")
          make_icon(152,  "Resources/AppIcon76x76@2x~ipad.png")
          make_icon(167,  "Resources/AppIcon83.5x83.5@2x~ipad.png")
          make_icon(1024, "Resources/AppIcon1024x1024.png")
          PYEOF
          ls -lh Resources

      - name: Generate Info.plist
        run: |
          cat > Resources/Info.plist << 'PEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>     <string>en</string>
              <key>CFBundleExecutable</key>            <string>VIP21Store</string>
              <key>CFBundleIdentifier</key>            <string>${{ env.NEW_BUNDLE_ID }}</string>
              <key>CFBundleInfoDictionaryVersion</key> <string>6.0</string>
              <key>CFBundleName</key>                  <string>${{ env.NEW_APP_NAME }}</string>
              <key>CFBundleDisplayName</key>            <string>${{ env.NEW_APP_NAME }}</string>
              <key>CFBundlePackageType</key>            <string>APPL</string>
              <key>CFBundleSignature</key>              <string>????</string>
              <key>CFBundleShortVersionString</key>     <string>1.0</string>
              <key>CFBundleVersion</key>                <string>1</string>
              <key>CFBundleSupportedPlatforms</key>
              <array><string>iPhoneOS</string></array>
              <key>LSRequiresIPhoneOS</key>             <true/>
              <key>MinimumOSVersion</key>               <string>16.0</string>
              <key>UIDeviceFamily</key>
              <array><integer>1</integer><integer>2</integer></array>
              <key>UIRequiredDeviceCapabilities</key>
              <array><string>arm64</string></array>
              <key>UISupportedInterfaceOrientations</key>
              <array><string>UIInterfaceOrientationPortrait</string></array>
              <key>UISupportedInterfaceOrientations~ipad</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationPortraitUpsideDown</string>
              </array>
              <key>CFBundleIconFile</key>              <string>AppIcon60x60</string>
              <key>CFBundleIcons</key>
              <dict>
                  <key>CFBundlePrimaryIcon</key>
                  <dict>
                      <key>CFBundleIconFiles</key>
                      <array>
                          <string>AppIcon60x60@2x.png</string>
                          <string>AppIcon60x60@3x.png</string>
                          <string>AppIcon60x60</string>
                      </array>
                      <key>CFBundleIconName</key><string>AppIcon</string>
                      <key>UIPrerenderedIcon</key><false/>
                  </dict>
              </dict>
              <key>CFBundleIcons~ipad</key>
              <dict>
                  <key>CFBundlePrimaryIcon</key>
                  <dict>
                      <key>CFBundleIconFiles</key>
                      <array>
                          <string>AppIcon76x76@2x~ipad.png</string>
                          <string>AppIcon83.5x83.5@2x~ipad.png</string>
                          <string>AppIcon60x60@2x.png</string>
                          <string>AppIcon76x76</string>
                          <string>AppIcon83.5x83.5</string>
                          <string>AppIcon60x60</string>
                      </array>
                      <key>CFBundleIconName</key><string>AppIcon</string>
                      <key>UIPrerenderedIcon</key><false/>
                  </dict>
              </dict>

              <!-- Critical: without a launch screen, iOS assumes this app was
                   built for old, small, non-Retina screens and letterboxes it
                   in a tiny centered window instead of filling the display.
                   An empty UILaunchScreen dict opts the app into the modern,
                   automatic, full-screen launch behavior on every device. -->
              <key>UILaunchScreen</key>
              <dict/>

              <key>UIRequiresFullScreen</key>          <true/>
              <key>UIStatusBarHidden</key>             <false/>
              <key>UIViewControllerBasedStatusBarAppearance</key><false/>

              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key><false/>
              </dict>
              <key>UIApplicationSupportsIndirectInputEvents</key><true/>
          </dict>
          </plist>
          PEOF

      # =========================================================
      # SOURCE CODE — Login feature only
      # =========================================================

      - name: Generate code - Constants.swift
        run: |
          cat > Constants.swift << 'VIPEOF'
          import SwiftUI

          struct AppConstants {
              static let appVersion = "1.0"
              static let storeName  = "21s"
              static let userDefaultsKey = "21sProUserData"
          }

          // Light, clean palette matching the reference login/register mockup:
          // white surfaces, deep navy titles/buttons, slate-blue accents.
          extension Color {
              static let xcodeBackground = Color.white
              static let xcodeEditor     = Color(red: 0.95, green: 0.955, blue: 0.965)
              static let xcodeBlue       = Color(red: 0.11, green: 0.17, blue: 0.30)
              static let xcodeAccent     = Color(red: 0.30, green: 0.43, blue: 0.58)
              static let xcodeGreen      = Color(red: 0.20, green: 0.65, blue: 0.40)
              static let xcodeOrange     = Color(red: 0.90, green: 0.55, blue: 0.20)
              static let xcodeRed        = Color(red: 0.85, green: 0.28, blue: 0.25)
              static let xcodeSecondary  = Color(red: 0.55, green: 0.57, blue: 0.62)
              static let xcodeDivider    = Color(red: 0.90, green: 0.90, blue: 0.93)
          }

          extension UIImage {
              /// Loads an image bundled directly into the app (not an asset catalog),
              /// e.g. the files copied into the .app bundle at build time.
              static func bundled(_ filename: String) -> UIImage? {
                  guard let path = Bundle.main.path(forResource: filename, ofType: nil) else { return nil }
                  return UIImage(contentsOfFile: path)
              }
          }
          VIPEOF

      - name: Generate code - HapticManager.swift
        run: |
          cat > HapticManager.swift << 'VIPEOF'
          import SwiftUI
          import UIKit

          class HapticManager {
              static let shared = HapticManager()
              func impact(_ style: UIImpactFeedbackGenerator.FeedbackStyle = .medium) {
                  UIImpactFeedbackGenerator(style: style).impactOccurred()
              }
              func notification(_ type: UINotificationFeedbackGenerator.FeedbackType) {
                  UINotificationFeedbackGenerator().notificationOccurred(type)
              }
              func selection() { UISelectionFeedbackGenerator().selectionChanged() }
              func success() { notification(.success) }
              func error() { notification(.error) }
          }

          struct XcodeCardModifier: ViewModifier {
              var radius: CGFloat = 12
              func body(content: Content) -> some View {
                  content
                      .background(
                          RoundedRectangle(cornerRadius: radius)
                              .fill(Color.xcodeEditor)
                              .overlay(
                                  RoundedRectangle(cornerRadius: radius)
                                      .stroke(Color.xcodeDivider, lineWidth: 0.5)
                              )
                      )
                      .clipShape(RoundedRectangle(cornerRadius: radius))
              }
          }

          extension View {
              func xcodeCard(radius: CGFloat = 12) -> some View {
                  modifier(XcodeCardModifier(radius: radius))
              }
          }
          VIPEOF

      - name: Generate code - Models.swift
        run: |
          cat > Models.swift << 'VIPEOF'
          import Foundation

          // MARK: - User Model for Authentication
          struct AppUser: Codable {
              let id: UUID
              let email: String
              let username: String
              let password: String
              let udid: String
              let createdAt: Date

              init(email: String, username: String, password: String, udid: String) {
                  self.id = UUID()
                  self.email = email
                  self.username = username
                  self.password = password
                  self.udid = udid
                  self.createdAt = Date()
              }
          }
          VIPEOF

      - name: Generate code - AuthManager.swift
        run: |
          cat > AuthManager.swift << 'VIPEOF'
          import SwiftUI
          import Foundation
          import Combine

          @MainActor
          final class AuthManager: ObservableObject {
              @Published var currentUser: AppUser?
              @Published var isAuthenticated: Bool = false
              @Published var isLoading: Bool = false
              @Published var errorMessage: String?

              private let userDefaultsKey = AppConstants.userDefaultsKey

              init() { loadUser() }

              func signUp(email: String, username: String, password: String, confirmPassword: String, udid: String) -> Bool {
                  isLoading = true
                  errorMessage = nil

                  if email.trimmingCharacters(in: .whitespaces).isEmpty {
                      errorMessage = "Email is required"; isLoading = false; return false
                  }
                  if !email.contains("@") || !email.contains(".") {
                      errorMessage = "Please enter a valid email address"; isLoading = false; return false
                  }
                  if username.trimmingCharacters(in: .whitespaces).isEmpty {
                      errorMessage = "Username is required"; isLoading = false; return false
                  }
                  if username.count < 3 {
                      errorMessage = "Username must be at least 3 characters"; isLoading = false; return false
                  }
                  if password.count < 6 {
                      errorMessage = "Password must be at least 6 characters"; isLoading = false; return false
                  }
                  if password != confirmPassword {
                      errorMessage = "Passwords do not match"; isLoading = false; return false
                  }
                  if udid.trimmingCharacters(in: .whitespaces).isEmpty {
                      errorMessage = "Device UDID is required"; isLoading = false; return false
                  }
                  if udid.count < 20 {
                      errorMessage = "Please enter a valid device UDID (at least 20 characters)"; isLoading = false; return false
                  }

                  let existingUsers = loadAllUsers()
                  if existingUsers.contains(where: { $0.email.lowercased() == email.lowercased() }) {
                      errorMessage = "An account with this email already exists"; isLoading = false; return false
                  }
                  if existingUsers.contains(where: { $0.username.lowercased() == username.lowercased() }) {
                      errorMessage = "This username is already taken"; isLoading = false; return false
                  }
                  if existingUsers.contains(where: { $0.udid == udid }) {
                      errorMessage = "This UDID is already registered to another account"; isLoading = false; return false
                  }

                  let newUser = AppUser(email: email, username: username, password: password, udid: udid)
                  var users = loadAllUsers()
                  users.append(newUser)
                  saveAllUsers(users)

                  currentUser = newUser
                  isAuthenticated = true
                  isLoading = false
                  HapticManager.shared.success()
                  UserDefaults.standard.set(newUser.id.uuidString, forKey: "currentUserID")
                  return true
              }

              func login(email: String, password: String) -> Bool {
                  isLoading = true
                  errorMessage = nil

                  if email.trimmingCharacters(in: .whitespaces).isEmpty {
                      errorMessage = "Email is required"; isLoading = false; return false
                  }
                  if password.trimmingCharacters(in: .whitespaces).isEmpty {
                      errorMessage = "Password is required"; isLoading = false; return false
                  }

                  let users = loadAllUsers()
                  guard let user = users.first(where: { $0.email.lowercased() == email.lowercased() && $0.password == password }) else {
                      errorMessage = "Invalid email or password"; isLoading = false; return false
                  }

                  currentUser = user
                  isAuthenticated = true
                  isLoading = false
                  HapticManager.shared.success()
                  UserDefaults.standard.set(user.id.uuidString, forKey: "currentUserID")
                  return true
              }

              func logout() {
                  currentUser = nil
                  isAuthenticated = false
                  UserDefaults.standard.removeObject(forKey: "currentUserID")
              }

              private func loadUser() {
                  guard let savedID = UserDefaults.standard.string(forKey: "currentUserID"),
                        let id = UUID(uuidString: savedID) else { return }
                  let users = loadAllUsers()
                  if let user = users.first(where: { $0.id == id }) {
                      currentUser = user
                      isAuthenticated = true
                  }
              }

              private func loadAllUsers() -> [AppUser] {
                  guard let data = UserDefaults.standard.data(forKey: userDefaultsKey),
                        let users = try? JSONDecoder().decode([AppUser].self, from: data) else { return [] }
                  return users
              }

              private func saveAllUsers(_ users: [AppUser]) {
                  if let data = try? JSONEncoder().encode(users) {
                      UserDefaults.standard.set(data, forKey: userDefaultsKey)
                  }
              }

              func getUDIDInfo() -> String {
                  return """
                  ⚠️ Important: Device UDID Information

                  Your UDID is a unique identifier for your iOS device.
                  This is required to ensure your account is linked to your specific device.

                  To find your UDID:
                  1. Connect your iPhone to a computer
                  2. Open Finder (macOS Catalina+) or iTunes (Windows)
                  3. Select your device
                  4. Click on the serial number until you see the UDID
                  5. Copy the UDID string

                  Or use a third-party app like "UDID Calculator" from the App Store.

                  ⚠️ Make sure you enter the correct UDID. This cannot be changed later.
                  """
              }
          }
          VIPEOF

      - name: Generate code - AuthViews.swift
        run: |
          cat > AuthViews.swift << 'VIPEOF'
          import SwiftUI
          import UIKit

          struct AuthView: View {
              @StateObject private var authManager = AuthManager()
              @State private var isLoginMode = true
              @State private var email = ""
              @State private var username = ""
              @State private var password = ""
              @State private var confirmPassword = ""
              @State private var udid = ""
              @State private var showUDIDInfo = false
              @State private var isPasswordVisible = false
              @State private var isConfirmPasswordVisible = false

              var body: some View {
                  Group {
                      if authManager.isAuthenticated {
                          ContentView(authManager: authManager)
                              .transition(.opacity)
                      } else {
                          ZStack {
                              Color.xcodeBackground.edgesIgnoringSafeArea(.all)

                              ScrollView(showsIndicators: false) {
                                  VStack(spacing: 28) {

                                      // Illustration — big, no circle mask, sitting on top
                                      // of soft decorative blobs like the reference design.
                                      // Each screen (Login / Register) has its own image.
                                      IllustrationHeader(isLoginMode: isLoginMode)
                                          .padding(.top, 24)

                                      VStack(alignment: .leading, spacing: 22) {
                                          VStack(alignment: .leading, spacing: 6) {
                                              Text(isLoginMode ? "Login" : "Register")
                                                  .font(.system(size: 32, weight: .heavy))
                                                  .foregroundColor(.xcodeBlue)
                                              Text(isLoginMode ? "Please Sign in to continue." : "Please register to login.")
                                                  .font(.system(size: 13))
                                                  .foregroundColor(.xcodeSecondary)
                                          }

                                          VStack(spacing: 14) {
                                              MockupField(icon: "person.fill", placeholder: "Username", text: $username)

                                              if !isLoginMode {
                                                  MockupField(icon: "phone.fill", placeholder: "Mobile Number", text: $email, keyboard: .phonePad)
                                              }

                                              MockupSecureField(
                                                  icon: "lock.fill",
                                                  placeholder: "Password",
                                                  text: $password,
                                                  isVisible: $isPasswordVisible
                                              )

                                              if !isLoginMode {
                                                  MockupSecureField(
                                                      icon: "lock.fill",
                                                      placeholder: "Confirm Password",
                                                      text: $confirmPassword,
                                                      isVisible: $isConfirmPasswordVisible
                                                  )

                                                  VStack(alignment: .trailing, spacing: 4) {
                                                      HStack {
                                                          Button { showUDIDInfo = true } label: {
                                                              Image(systemName: "info.circle.fill")
                                                                  .font(.system(size: 13))
                                                                  .foregroundColor(.xcodeAccent)
                                                          }
                                                          Text("Device UDID")
                                                              .font(.system(size: 12))
                                                              .foregroundColor(.xcodeSecondary)
                                                          Spacer()
                                                      }
                                                      MockupField(icon: "iphone", placeholder: "Enter your device UDID", text: $udid, autocap: true)
                                                  }
                                              }

                                              HStack {
                                                  Text("Reminder me nextime")
                                                      .font(.system(size: 12))
                                                      .foregroundColor(.xcodeSecondary)
                                                  Spacer()
                                                  Toggle("", isOn: .constant(true))
                                                      .labelsHidden()
                                                      .tint(.xcodeBlue)
                                              }
                                          }

                                          if let error = authManager.errorMessage {
                                              HStack(spacing: 6) {
                                                  Image(systemName: "exclamationmark.triangle.fill")
                                                      .foregroundColor(.xcodeRed)
                                                      .font(.system(size: 12))
                                                  Text(error)
                                                      .font(.system(size: 12))
                                                      .foregroundColor(.xcodeRed)
                                                  Spacer()
                                              }
                                          }

                                          Button {
                                              HapticManager.shared.impact(.medium)
                                              if isLoginMode {
                                                  _ = authManager.login(email: email, password: password)
                                              } else {
                                                  _ = authManager.signUp(
                                                      email: email, username: username,
                                                      password: password, confirmPassword: confirmPassword,
                                                      udid: udid
                                                  )
                                              }
                                          } label: {
                                              HStack(spacing: 8) {
                                                  if authManager.isLoading {
                                                      ProgressView().progressViewStyle(CircularProgressViewStyle(tint: .white)).scaleEffect(0.8)
                                                  }
                                                  Text(authManager.isLoading ? "Loading..." : (isLoginMode ? "Sign In" : "Sign Up"))
                                                      .font(.system(size: 15, weight: .semibold))
                                              }
                                              .foregroundColor(.white)
                                              .frame(maxWidth: .infinity)
                                              .frame(height: 50)
                                              .background(Capsule().fill(Color.xcodeBlue))
                                              .opacity(authManager.isLoading ? 0.6 : 1.0)
                                          }
                                          .disabled(authManager.isLoading)

                                          Button {
                                              HapticManager.shared.selection()
                                              withAnimation(.spring()) {
                                                  isLoginMode.toggle()
                                                  email = ""; username = ""; password = ""
                                                  confirmPassword = ""; udid = ""
                                                  authManager.errorMessage = nil
                                              }
                                          } label: {
                                              HStack(spacing: 4) {
                                                  Spacer()
                                                  Text(isLoginMode ? "Don't have account?" : "Already have account?")
                                                      .font(.system(size: 13))
                                                      .foregroundColor(.xcodeSecondary)
                                                  Text(isLoginMode ? "Sign Up" : "Sign In")
                                                      .font(.system(size: 13, weight: .bold))
                                                      .foregroundColor(.xcodeAccent)
                                                  Spacer()
                                              }
                                          }
                                      }
                                      .padding(.horizontal, 28)
                                  }
                                  .padding(.bottom, 40)
                              }
                          }
                          .sheet(isPresented: $showUDIDInfo) { UDIDInfoView() }
                          .preferredColorScheme(.light)
                      }
                  }
                  .animation(.easeInOut(duration: 0.3), value: authManager.isAuthenticated)
              }
          }

          /// Big illustration with soft decorative circles behind it, matching
          /// the reference design. No circular mask/border on the image itself.
          /// Login and Register each use their own dedicated image, same size.
          struct IllustrationHeader: View {
              let isLoginMode: Bool

              private var imageName: String { isLoginMode ? "login_logo.png" : "register_logo.png" }

              var body: some View {
                  ZStack {
                      Circle()
                          .fill(Color.xcodeEditor)
                          .frame(width: 230, height: 230)
                          .offset(x: -40, y: 10)
                      Circle()
                          .fill(Color.xcodeAccent.opacity(0.12))
                          .frame(width: 150, height: 150)
                          .offset(x: 90, y: -30)

                      if let img = UIImage.bundled(imageName) {
                          Image(uiImage: img)
                              .resizable()
                              .aspectRatio(contentMode: .fit)
                              .frame(width: 240, height: 240)
                              .id(imageName)
                              .transition(.opacity)
                      } else {
                          Image(systemName: "person.crop.circle.badge.checkmark")
                              .font(.system(size: 100))
                              .foregroundColor(.xcodeAccent)
                      }
                  }
                  .frame(height: 250)
                  .animation(.easeInOut(duration: 0.25), value: isLoginMode)
              }
          }

          struct MockupField: View {
              let icon: String
              let placeholder: String
              @Binding var text: String
              var keyboard: UIKeyboardType = .default
              var autocap: Bool = false
              var body: some View {
                  HStack(spacing: 10) {
                      Image(systemName: icon)
                          .font(.system(size: 14))
                          .foregroundColor(.xcodeSecondary)
                          .frame(width: 18)
                      TextField(placeholder, text: $text)
                          .font(.system(size: 14))
                          .keyboardType(keyboard)
                          .autocapitalization(autocap ? .allCharacters : .none)
                  }
                  .padding(.horizontal, 14)
                  .frame(height: 48)
                  .background(RoundedRectangle(cornerRadius: 10).fill(Color.xcodeEditor))
              }
          }

          struct MockupSecureField: View {
              let icon: String
              let placeholder: String
              @Binding var text: String
              @Binding var isVisible: Bool
              var body: some View {
                  HStack(spacing: 10) {
                      Image(systemName: icon)
                          .font(.system(size: 14))
                          .foregroundColor(.xcodeSecondary)
                          .frame(width: 18)
                      if isVisible {
                          TextField(placeholder, text: $text)
                              .font(.system(size: 14))
                      } else {
                          SecureField(placeholder, text: $text)
                              .font(.system(size: 14))
                      }
                      Button { isVisible.toggle() } label: {
                          Image(systemName: isVisible ? "eye.slash.fill" : "eye.fill")
                              .font(.system(size: 13))
                              .foregroundColor(.xcodeSecondary)
                      }
                  }
                  .padding(.horizontal, 14)
                  .frame(height: 48)
                  .background(RoundedRectangle(cornerRadius: 10).fill(Color.xcodeEditor))
              }
          }

          struct UDIDInfoView: View {
              @Environment(\.dismiss) var dismiss
              var body: some View {
                  NavigationView {
                      ScrollView {
                          VStack(alignment: .leading, spacing: 16) {
                              Image(systemName: "iphone.gen3")
                                  .font(.system(size: 60))
                                  .foregroundColor(.xcodeAccent)
                                  .frame(maxWidth: .infinity, alignment: .center)

                              Text("What is UDID?")
                                  .font(.system(size: 22, weight: .black))
                                  .foregroundColor(.xcodeBlue)
                                  .frame(maxWidth: .infinity, alignment: .center)

                              Text("""
                              UDID stands for Unique Device Identifier. It is a 40-character hexadecimal string that uniquely identifies your iOS device.

                              ⚠️ IMPORTANT: You must enter your device's official UDID. This cannot be changed after registration.

                              How to find your UDID:
                              1. Connect your iPhone/iPad to a computer
                              2. Open Finder (macOS Catalina+) or iTunes (Windows)
                              3. Select your device
                              4. Click on the serial number until it changes to UDID
                              5. Copy the 40-character UDID string

                              Alternative method:
                              - Use a third-party app like "UDID Calculator" from the App Store
                              - Or use online services like https://udid.io

                              ⚠️ Entering the wrong UDID will cause issues later on.
                              """)
                              .font(.system(size: 14))
                              .foregroundColor(.xcodeSecondary)

                              Spacer()
                          }
                          .padding(20)
                      }
                      .navigationBarTitleDisplayMode(.inline)
                      .toolbar {
                          ToolbarItem(placement: .navigationBarTrailing) {
                              Button("Done") { dismiss() }.foregroundColor(.xcodeAccent)
                          }
                      }
                  }
                  .preferredColorScheme(.light)
              }
          }
          VIPEOF

      - name: Generate code - ContentView.swift
        run: |
          cat > ContentView.swift << 'VIPEOF'
          import SwiftUI

          struct ContentView: View {
              @ObservedObject var authManager: AuthManager

              var body: some View {
                  ZStack {
                      Color.xcodeBackground.edgesIgnoringSafeArea(.all)
                      VStack(spacing: 20) {
                          Image(systemName: "checkmark.seal.fill")
                              .font(.system(size: 60))
                              .foregroundColor(.xcodeGreen)
                          Text("Logged in")
                              .font(.system(size: 22, weight: .black))
                              .foregroundColor(.xcodeBlue)
                          if let user = authManager.currentUser {
                              Text(user.username)
                                  .font(.system(size: 15, weight: .semibold))
                                  .foregroundColor(.xcodeSecondary)
                              Text(user.email)
                                  .font(.system(size: 13))
                                  .foregroundColor(.xcodeSecondary)
                          }
                          Button {
                              HapticManager.shared.impact(.light)
                              authManager.logout()
                          } label: {
                              Text("Log out")
                                  .font(.system(size: 14, weight: .semibold))
                                  .foregroundColor(.white)
                                  .frame(width: 160, height: 44)
                                  .background(RoundedRectangle(cornerRadius: 10).fill(Color.xcodeRed))
                          }
                          .padding(.top, 12)
                      }
                  }
              }
          }
          VIPEOF

      - name: Generate code - VIP21StoreApp.swift
        run: |
          cat > VIP21StoreApp.swift << 'VIPEOF'
          import SwiftUI

          @main
          struct VIP21StoreApp: App {
              var body: some Scene {
                  WindowGroup {
                      AuthView()
                  }
              }
          }
          VIPEOF

      # =========================================================
      # BUILD
      # =========================================================
      - name: Build the app
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK: $SDK"
          xcrun swiftc \
            Constants.swift \
            HapticManager.swift \
            Models.swift \
            AuthManager.swift \
            AuthViews.swift \
            ContentView.swift \
            VIP21StoreApp.swift \
            -sdk "$SDK" \
            -target arm64-apple-ios16.0 \
            -O \
            -module-name VIP21Store \
            -framework SwiftUI \
            -framework UIKit \
            -framework Foundation \
            -o VIP21Store
          file VIP21Store

      - name: Create IPA package
        run: |
          export COPYFILE_DISABLE=1
          mkdir -p artifacts
          rm -rf build-output
          mkdir -p build-output/Payload/VIP21Store.app
          cp VIP21Store                              build-output/Payload/VIP21Store.app/VIP21Store
          cp Resources/Info.plist                    build-output/Payload/VIP21Store.app/Info.plist
          cp Resources/AppIcon60x60@2x.png           build-output/Payload/VIP21Store.app/
          cp Resources/AppIcon60x60@3x.png           build-output/Payload/VIP21Store.app/
          cp Resources/AppIcon76x76@2x~ipad.png      build-output/Payload/VIP21Store.app/
          cp Resources/AppIcon83.5x83.5@2x~ipad.png  build-output/Payload/VIP21Store.app/
          cp Resources/AppIcon1024x1024.png          build-output/Payload/VIP21Store.app/
          cp Resources/login_logo.png                build-output/Payload/VIP21Store.app/
          cp Resources/register_logo.png             build-output/Payload/VIP21Store.app/
          ldid -S build-output/Payload/VIP21Store.app/VIP21Store

          # Strip any macOS metadata/resource-fork junk that some iOS
          # unzip/extraction libraries choke on ("._filename", .DS_Store)
          find build-output -name ".DS_Store" -delete
          find build-output -name "._*" -delete

          # Use ditto instead of zip: it produces a clean, standard IPA zip
          # (this is Apple's own recommended way to package an .app as IPA
          # and avoids the AppleDouble/extra-attribute entries that plain
          # `zip` can add, which is the usual cause of "failed to extract"
          # errors in third-party installers)
          cd build-output
          ditto -c -k --sequesterRsrc --keepParent Payload ../artifacts/21s.ipa
          cd ..
          echo "IPA: $(du -sh artifacts/21s.ipa)"

      - name: Verify IPA package
        run: |
          echo "== IPA Contents =="
          unzip -l artifacts/21s.ipa | head -35
          if ! unzip -l artifacts/21s.ipa | grep -q "Payload/VIP21Store.app/VIP21Store"; then
            echo "❌ Error: IPA does not contain a valid App Bundle"
            exit 1
          fi
          echo "== Integrity test =="
          unzip -t artifacts/21s.ipa > /dev/null
          echo "✅ IPA is valid, passes zip integrity test, and contains the App Bundle."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 21s-Login-Only-IPA
          path: artifacts/21s.ipa
